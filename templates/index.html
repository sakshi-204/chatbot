<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>University Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      height: 100vh;
      padding: 20px;
    }

    /* Floating button */
    #chat-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: #3b2fa0;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 1000;
    }
    #chat-toggle svg { width: 26px; height: 26px; fill: white; }

    /* Chat window */
    #chat-window {
      position: fixed;
      bottom: 90px;
      right: 24px;
      width: 360px;
      height: 520px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transition: opacity 0.2s, transform 0.2s;
    }
    #chat-window.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
    }

    /* Header */
    #chat-header {
      background: #3b2fa0;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #chat-header .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 16px;
    }
    #chat-header .hinfo .hname { font-weight: 600; font-size: 15px; }
    #chat-header .hinfo .hstatus {
      font-size: 12px; opacity: 0.8;
      display: flex; align-items: center; gap: 5px;
    }
    #chat-header .hinfo .hstatus::before {
      content: ''; width: 7px; height: 7px;
      border-radius: 50%; background: #90ee90; display: inline-block;
    }
    #close-btn {
      margin-left: auto; background: none; border: none;
      color: white; font-size: 22px; cursor: pointer; line-height: 1;
    }

    /* Quick reply chips */
    #chips {
      padding: 10px 12px 0;
      display: flex; flex-wrap: wrap; gap: 7px;
    }
    .chip {
      background: #ede9ff; color: #3b2fa0;
      border: 1px solid #c5bbf5;
      border-radius: 999px; font-size: 12px;
      padding: 5px 12px; cursor: pointer;
      transition: background 0.15s;
    }
    .chip:hover { background: #c5bbf5; }

    /* Messages */
    #messages {
      flex: 1; overflow-y: auto; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg { display: flex; gap: 8px; align-items: flex-end; max-width: 90%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 10px 13px; border-radius: 16px;
      font-size: 13.5px; line-height: 1.6;
      white-space: pre-line;
    }
    .msg.bot .bubble {
      background: #f0f2f5; color: #222;
      border-bottom-left-radius: 4px;
    }
    .msg.user .bubble {
      background: #3b2fa0; color: white;
      border-bottom-right-radius: 4px;
    }
    .bot-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: #ede9ff; display: flex;
      align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .time {
      font-size: 11px; color: #aaa;
      margin-top: 3px;
    }
    .msg.user .time { text-align: right; }

    /* Typing indicator */
    .typing-bubble {
      background: #f0f2f5; padding: 12px 14px;
      border-radius: 16px; border-bottom-left-radius: 4px;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #aaa; animation: blink 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Input area */
    #input-area {
      padding: 10px 12px;
      border-top: 1px solid #eee;
      display: flex; gap: 8px;
    }
    #user-input {
      flex: 1; padding: 9px 14px;
      border: 1px solid #ddd; border-radius: 999px;
      font-size: 13.5px; outline: none;
      font-family: inherit;
    }
    #user-input:focus { border-color: #3b2fa0; }
    #send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: #3b2fa0; border: none;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    #send-btn svg { width: 16px; height: 16px; fill: white; }
  </style>
</head>
<body>

<!-- Floating toggle button -->
<button id="chat-toggle" onclick="toggleChat()">
  <svg viewBox="0 0 24 24"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/></svg>
</button>

<!-- Chat window -->
<div id="chat-window" class="hidden">
  <div id="chat-header">
    <div class="avatar">U</div>
    <div class="hinfo">
      <div class="hname">University Assistant</div>
      <div class="hstatus">Online — Ask me anything</div>
    </div>
    <button id="close-btn" onclick="toggleChat()">×</button>
  </div>

  <!-- Quick reply chips -->
  <div id="chips">
    <button class="chip" onclick="quickSend('Admissions')">Admissions</button>
    <button class="chip" onclick="quickSend('Courses offered')">Courses</button>
    <button class="chip" onclick="quickSend('Fee structure')">Fees</button>
    <button class="chip" onclick="quickSend('Placement details')">Placements</button>
    <button class="chip" onclick="quickSend('Campus facilities')">Campus</button>
    <button class="chip" onclick="quickSend('Contact information')">Contact</button>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Type your message..." />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  function getTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function toggleChat() {
    const w = document.getElementById('chat-window');
    w.classList.toggle('hidden');
  }

  function addMessage(text, who) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${who}`;

    if (who === 'bot') {
      const icon = document.createElement('div');
      icon.className = 'bot-icon'; icon.textContent = '🎓';
      wrap.appendChild(icon);
    }

    const inner = document.createElement('div');
    const bub = document.createElement('div');
    bub.className = 'bubble'; bub.textContent = text;
    const ts = document.createElement('div');
    ts.className = 'time'; ts.textContent = getTime();
    inner.appendChild(bub); inner.appendChild(ts);
    wrap.appendChild(inner);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot'; wrap.id = 'typing';
    const icon = document.createElement('div');
    icon.className = 'bot-icon'; icon.textContent = '🎓';
    const bub = document.createElement('div');
    bub.className = 'typing-bubble';
    bub.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(icon); wrap.appendChild(bub);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage(text) {
    const input = document.getElementById('user-input');
    const msg = (text || input.value).trim();
    if (!msg) return;
    input.value = '';

    addMessage(msg, 'user');
    showTyping();

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.reply, 'bot');
  }

  function quickSend(text) { sendMessage(text); }

  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  // Welcome message on load
  window.onload = () => {
    setTimeout(() => addMessage(
      "Welcome to Springfield University! 🎓\n\nHow can I help you today? Use the quick buttons above or type your question.",
      'bot'
    ), 500);
  };
</script>
</body>
</html>
